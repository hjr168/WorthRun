limit_req_zone $binary_remote_addr zone=worth_feedback:1m rate=6r/m;

server {
  server_name run-api.huangjiarong.top;

  location = /api/feedback {
    client_max_body_size 16k;
    limit_req zone=worth_feedback burst=3 nodelay;
    limit_req_status 429;

    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  listen 443 ssl;
  ssl_certificate /etc/letsencrypt/live/run-api.huangjiarong.top/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/run-api.huangjiarong.top/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
  server_name run-admin.huangjiarong.top;
  root /opt/worth-running/apps/admin/dist;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  listen 443 ssl;
  ssl_certificate /etc/letsencrypt/live/run-api.huangjiarong.top/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/run-api.huangjiarong.top/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
  listen 80;
  server_name run-api.huangjiarong.top;
  return 301 https://$host$request_uri;
}

server {
  listen 80;
  server_name run-admin.huangjiarong.top;
  return 301 https://$host$request_uri;
}
