services:
  postgres:
    image: postgres:16-alpine
    container_name: worth-running-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: worth_running
      POSTGRES_PASSWORD: worth_running
      POSTGRES_DB: worth_running
    ports:
      - "5432:5432"
    volumes:
      - worth-running-postgres:/var/lib/postgresql/data

volumes:
  worth-running-postgres:
